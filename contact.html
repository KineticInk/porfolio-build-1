<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            background-color: #000;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-decoration: none;
            color: #fff;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

     
        .content-section {
            padding: 100px 40px;
            text-align: center;
            background: #000;
        }

        .content-section h1 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .content-section h2 {
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #aaa;
        }

        .content-section p {
            font-size: 16px;
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto;
            color: #ccc;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 2px;
            background: #fff;
            transition: 0.3s;
        }

        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            nav {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                height: 100vh;
                background: rgba(0, 0, 0, 0.95);
                flex-direction: column;
                padding: 80px 30px;
                transition: right 0.3s;
            }

            nav.active {
                right: 0;
            }

            .menu-toggle {
                display: flex;
            }

            .content-section h1 {
                font-size: 32px;
            }

            .content-section h2 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="logo"><strong>Jaelon Stimak-Eckman </strong></a>
        <nav id="nav">
            <a href="/portfolio.html">Portfolio</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
        </nav>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

        </div>
        <div class="content-section">
        <h1>CONTACT ME  </h1>
        <h2>for inquiries :)</h2>

         <img src="3.JPG" alt="Mountain landscape" width="1000px">
         <p>   </p>
    </div>
    <!-- CONTACT FORM SECTION - Copy this entire block into your portfolio.html -->
<!-- Insert it after the .content-section div, before the closing </body> tag -->

<style>
    /* Contact Form Styles */
    .contact-section {
        padding: 100px 40px;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .contact-container {
        max-width: 600px;
        width: 100%;
    }

    .contact-section h2 {
        font-size: 36px;
        font-weight: 300;
        margin-bottom: 15px;
        letter-spacing: 3px;
        text-align: center;
        color: #fff;
    }

    .contact-section p {
        font-size: 14px;
        color: #aaa;
        text-align: center;
        margin-bottom: 50px;
        letter-spacing: 1px;
    }

    .form-group {
        margin-bottom: 30px;
    }

    .form-group label {
        display: block;
        font-size: 12px;
        letter-spacing: 2px;
        color: #aaa;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 15px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 14px;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        transition: border-color 0.3s, background 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.08);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 150px;
    }

    .submit-btn {
        width: 100%;
        padding: 18px;
        background: #fff;
        color: #000;
        border: none;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.3s, color 0.3s;
        font-weight: 500;
    }

    .submit-btn:hover {
        background: rgba(255, 255, 255, 0.9);
    }

    .submit-btn:active {
        transform: translateY(1px);
    }

    @media (max-width: 768px) {
        .contact-section {
            padding: 60px 20px;
        }

        .contact-section h2 {
            font-size: 28px;
        }
    }
</style>

<div class="contact-section" id="contact">
    <div class="contact-container">
        <h2>Get In Touch</h2>
        <p>Available for commissions and collaborations</p>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            subject: document.getElementById('subject').value,
            message: document.getElementById('message').value
        };

        // Here you would send to your backend/email service
        console.log('Form submitted:', formData);
        
        // Show success message
        alert('Thank you for your message! I will get back to you soon.');
        
        // Reset form
        this.reset();
    });
</script>
</body>
</html>
